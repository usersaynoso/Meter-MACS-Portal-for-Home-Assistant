name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish or verify"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Build zip
        run: |
          cd custom_components/meter_macs
          zip -r ../../meter_macs.zip .

      - name: Publish or verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" meter_macs.zip --clobber
            exit 0
          fi

          if gh release create "$RELEASE_TAG" \
            --verify-tag \
            --generate-notes \
            --latest \
            meter_macs.zip; then
            exit 0
          fi

          for attempt in 1 2 3; do
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release upload "$RELEASE_TAG" meter_macs.zip --clobber
              exit 0
            fi
            sleep $((attempt * 5))
          done

          gh release view "$RELEASE_TAG"
